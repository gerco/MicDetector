version: 2

builds:
  - id: micdetector
    binary: micdetector
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: micdetector
    formats: [tar.gz]
    name_template: "micdetector_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - DESIGN.md
      - config.example.json

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc

brews:
  - name: micdetector
    repository:
      owner: gerco
      name: homebrew-micdetector
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/gerco/MicDetector"
    description: "Publishes macOS microphone and camera status over MQTT"
    license: "MIT"
    install: |
      bin.install "micdetector"
    service: |
      run [opt_bin/"micdetector"]
      keep_alive true
      log_path var/"log/micdetector.log"
      error_log_path var/"log/micdetector.log"
    caveats: |
      MicDetector requires microphone and camera permissions.
      Grant access in System Settings > Privacy & Security on first run.

      To configure, edit:
        ~/Library/Application Support/MicDetector/config.json

      To start as a background service:
        brew services start micdetector
    test: |
      assert_match version.to_s, shell_output("#{bin}/micdetector -version")

release:
  github:
    owner: gerco
    name: MicDetector
