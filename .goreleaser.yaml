version: 2

# This is the merge configuration - it combines all platform builds
# The actual builds happen in platform-specific configs

# Partial builds are imported from dist/
# This config only handles release metadata and publishing

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge branch"
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Other
      order: 999

# Homebrew is defined in darwin config but needs to be here for merge
brews:
  - name: micdetector
    repository:
      owner: gerco
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/gerco/MicDetector"
    description: "Publishes macOS microphone and camera status over MQTT"
    license: "MIT"
    install: |
      bin.install "micdetector"
    service: |
      run [opt_bin/"micdetector"]
      keep_alive successful_exit: false
    caveats: |
      On first start, MicDetector creates a default config file at:
        ~/Library/Application Support/MicDetector/config.json

      Edit it to set your MQTT broker address, then restart:
        brew services restart micdetector

      MicDetector requires microphone and camera permissions.
      Grant access in System Settings > Privacy & Security on first run.

      To view logs:
        log stream --predicate 'subsystem == "com.micdetector"' --style compact
    test: |
      assert_match version.to_s, shell_output("#{bin}/micdetector -version")

# Release configuration
release:
  github:
    owner: gerco
    name: MicDetector
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## MicDetector {{ .Version }}

    Cross-platform microphone and camera detection with MQTT publishing.
  footer: |
    ## Installation

    **macOS (Homebrew):**
    ```bash
    brew tap gerco/tap
    brew install micdetector
    brew services start micdetector
    ```

    **Windows:**
    Download the appropriate binary from the assets below.

    ## Downloads

    | Platform | Architecture | Archive |
    |----------|-------------|---------|
    | macOS | Apple Silicon (ARM64) | `micdetector_{{ .Version }}_darwin_arm64.tar.gz` |
    | macOS | Intel (AMD64) | `micdetector_{{ .Version }}_darwin_amd64.tar.gz` |
    | Windows | AMD64 | `micdetector_{{ .Version }}_windows_amd64.zip` |
