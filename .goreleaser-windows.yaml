version: 2

# Windows specific configuration
builds:
  - id: micdetector-windows
    binary: micdetector
    env:
      - CGO_ENABLED=1
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: micdetector-windows
    formats: [zip]
    name_template: "micdetector_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - config.example.json

checksum:
  name_template: "checksums.txt"
  disable: true  # Merged by the final release

changelog:
  sort: asc
  disable: true  # Only generate in merge job

